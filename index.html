<style>
  /* ============ Geary's Games "nightsky" theme ============ */
  :root{
    --bg:#0a0f23; --panel:#141f42; --panel2:#1b2d5e; --line:#26355f;
    --ink:#e8ecf8; --muted:#93a0bd; --accent:#e8621a; --accent2:#f4925c;
    --pulled:#16a34a; --pulled-bg:#0e2b1e; --missing:#c0392b; --missing-bg:#3a1714;
    --partial-bg:#2e2410; --partial-line:#8a6a2a;
    --foil:#8e7bd6; --tap:52px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none}
  body{display:flex;flex-direction:column;background-color:var(--bg);
    background-image:
      radial-gradient(1px 1px at 25px 35px, rgba(255,255,255,.40), transparent 45%),
      radial-gradient(1px 1px at 130px 90px, rgba(255,255,255,.25), transparent 45%),
      radial-gradient(1.5px 1.5px at 200px 40px, rgba(255,255,255,.35), transparent 45%),
      radial-gradient(1px 1px at 70px 160px, rgba(255,255,255,.22), transparent 45%),
      radial-gradient(1.2px 1.2px at 240px 140px, rgba(255,255,255,.30), transparent 45%);
    background-size:280px 200px}

  header{background:#0d1733;border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{height:44px;width:auto;display:block}
  .brand{font-weight:800;font-size:19px;letter-spacing:.3px;line-height:1.15}
  .brand .g{color:var(--accent)}
  .datebox{color:var(--muted);font-size:13px}
  .overall{margin-left:auto;display:flex;align-items:center;gap:14px}
  .stat{text-align:center;line-height:1.1}
  .stat .n{font-size:22px;font-weight:800}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat.miss .n{color:var(--accent2)}
  .bar{width:180px;height:12px;background:var(--panel2);border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pulled),#2ecc71);transition:width .25s}
  .pct{font-size:15px;font-weight:800;min-width:44px;text-align:right}

  .banner{padding:9px 16px;font-size:13px;font-weight:600;text-align:center;display:none}
  .banner.show{display:block}
  .banner.warn{background:#3a2e14;color:#f0c96b;border-bottom:1px solid #6b5320}
  .banner.err{background:#3a1714;color:#ffd7d1;border-bottom:1px solid #7d2b22}

  nav{display:flex;gap:8px;padding:10px 14px;background:#0d1733;
    border-bottom:1px solid var(--line);overflow-x:auto;flex-wrap:nowrap}
  .tab{flex:0 0 auto;min-height:var(--tap);padding:8px 16px;border-radius:12px;
    background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px;cursor:pointer}
  .tab .pip{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.25)}
  .tab .cnt{font-size:12px;color:var(--muted);background:var(--bg);border-radius:20px;padding:2px 8px;min-width:30px;text-align:center}
  .tab.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,98,26,.35) inset}
  .tab.done .cnt{color:#7ee59b}
  .c-W{background:#f7f2d8} .c-U{background:#3b7cc4} .c-B{background:#4b4b52}
  .c-R{background:#c9432f} .c-G{background:#3f9a5b} .c-M{background:linear-gradient(135deg,#e8b23a,#c9432f,#3b7cc4)}
  .c-L{background:#8a6a45} .c-BL{background:#c9b58a} .c-C{background:#b9bfc7}

  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 120px}
  .msg{color:var(--muted);text-align:center;padding:60px 20px;font-size:16px;line-height:1.5}
  .grouphdr{display:flex;align-items:center;gap:10px;margin:14px 4px 6px;color:var(--muted);
    font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .grouphdr.foil{color:var(--foil)}
  .grouphdr .rule{flex:1;height:1px;background:var(--line)}

  .row{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    margin:6px 0;padding:10px;display:flex;align-items:center;gap:12px;transition:background .15s,border-color .15s}
  .row.alt{background:#2a3d6e;border-color:#3d5390}
  .row .body{flex:1;min-width:0;cursor:pointer;display:flex;align-items:center;gap:12px}
  .thumb{flex:0 0 auto;width:52px;height:73px;border-radius:6px;background:var(--panel2);
    border:1px solid var(--line);object-fit:cover;display:block;cursor:zoom-in}
  .thumb.ph{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);text-align:center;padding:2px;cursor:default}
  .qty{flex:0 0 auto;min-width:40px;height:40px;border-radius:9px;background:var(--panel2);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}
  .info{min-width:0}
  .name{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .name .num{font-size:13px;color:var(--muted);font-weight:600}
  .name .fo{display:inline-block;font-size:10px;font-weight:800;color:#1a1a1a;background:var(--foil);
    border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle;letter-spacing:.5px}
  .name .pn{display:inline-block;font-size:12px;font-weight:800;color:#fff;background:#0d1733;
    border:1px solid var(--accent);border-radius:6px;padding:1px 8px;margin-right:8px;vertical-align:1px}
  .meta{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .sc{color:#cfd8ea;font-weight:800;letter-spacing:.4px}
  .meta i{color:#aeb9d1}
  .rar{display:inline-block;font-weight:800;font-size:11px;border:1px solid #4a5a85;border-radius:4px;padding:0 5px;margin:0 1px;vertical-align:1px}
  .yr{color:#7f8db0}
  .ctbig{display:inline-block;font-weight:900;font-size:13px;color:#ffb08a;border:2px solid #7d5b3a;
    border-radius:5px;padding:0 6px;letter-spacing:.5px;vertical-align:1px}
  .rN{color:#cfd6e4} .rU{color:#a8c0d8} .rR{color:#e5c05a} .rM{color:#ef8352} .rS{color:#c79be0}
  .pm{font-size:12px;font-weight:700;margin-top:2px}
  .pm .pp{color:#7ee59b} .pm .mm{color:#ff9d8f}
  .tag{flex:0 0 auto;font-size:11px;font-weight:800;letter-spacing:.4px;padding:3px 8px;border-radius:6px;
    border:1px solid var(--line);color:var(--muted);text-transform:uppercase}
  .tag.SP{border-color:#3a5b7d;color:#8fb6dd} .tag.CT{border-color:#7d5b3a;color:#dda98f}

  .actions{flex:0 0 auto;display:flex;gap:8px}
  .btn{min-width:var(--tap);height:var(--tap);border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:14px;font-weight:800;padding:0 14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;white-space:nowrap}
  .btn.pull.on{background:var(--pulled);border-color:#2ecc71}
  .btn.miss.on{background:var(--missing);border-color:#e74c3c}
  .row.pulled{background:var(--pulled-bg);border-color:#276b3c}
  .row.pulled .name{text-decoration:line-through;color:#bfe9cb}
  .row.missing{background:var(--missing-bg);border-color:#7d2b22}
  .row.missing .name{color:#f0b9b1}
  .row.partial{background:var(--partial-bg);border-color:var(--partial-line)}

  footer{position:fixed;left:0;right:0;bottom:0;background:#0d1733;border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:14px;z-index:20}
  .summary{color:var(--muted);font-size:14px}
  .summary b{color:var(--ink)} .summary .m{color:var(--accent2)}
  #submit{margin-left:auto;height:56px;padding:0 26px;border-radius:14px;border:none;
    background:var(--accent);color:#fff;font-size:18px;font-weight:800;cursor:pointer}
  #submit:disabled{opacity:.45} #submit.warn{background:#b34d15}

  .overlay{position:fixed;inset:0;background:rgba(4,7,18,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:520px;width:100%;padding:22px}
  .modal h2{margin:0 0 6px;font-size:22px}
  .modal p{color:var(--muted);margin:6px 0 16px;line-height:1.4}
  .modal .list{max-height:40vh;overflow:auto;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:16px}
  .modal .list div{padding:6px 0;border-bottom:1px solid var(--line);font-size:15px}
  .modal .list div:last-child{border-bottom:none}
  .modal .btns{display:flex;gap:12px}
  .modal button{flex:1;height:54px;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;border:1px solid var(--line)}
  .modal .cancel{background:var(--panel2);color:var(--ink)}
  .modal .confirm{background:var(--accent);color:#fff;border:none}
  .toast{position:fixed;left:50%;top:24px;transform:translateX(-50%);background:#123d22;border:1px solid #2ecc71;
    color:#d6ffe4;padding:14px 22px;border-radius:12px;font-weight:700;z-index:60;display:none}
  .toast.show{display:block} .toast.err{background:#3a1714;border-color:#e74c3c;color:#ffd7d1}

  /* card image zoom (tap) + hover preview (mouse) */
  #zoomOv{z-index:55;flex-direction:column;gap:12px;cursor:zoom-out}
  #zoomOv img{max-width:min(92vw,480px);max-height:78vh;border-radius:18px;box-shadow:0 12px 60px rgba(0,0,0,.7)}
  #zoomCap{color:var(--ink);font-weight:700;font-size:16px;text-align:center}
  #hoverPrev{position:fixed;display:none;z-index:54;pointer-events:none}
  #hoverPrev img{width:300px;border-radius:14px;box-shadow:0 10px 44px rgba(0,0,0,.75);display:block;background:var(--panel2)}
</style>

<body>

<header>
  <img class="logo" src="https://images.shadowpos.com/store_01kp8wykrne8g960nefcrxz8sw/collections/upload_2026-05-29T23-41-41-789Z.png" alt="Geary's Games" onerror="this.style.display='none'">
  <div>
    <div class="brand">Pull Sheet</div>
    <div class="datebox" id="dateLabel">Loading…</div>
  </div>
  <div class="overall">
    <div class="stat"><div class="n" id="ovPulled">0</div><div class="l">Pulled</div></div>

    <div class="pct" id="ovPct">0%</div>
  </div>
</header>

<div class="banner" id="banner"></div>

<main id="list"><div class="msg">Loading today's orders…</div></main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="mTitle">Submit report?</h2>
    <p id="mSub"></p>
    <div class="list" id="mList"></div>

      <button class="cancel" id="mCancel">Keep pulling</button>
      <button class="confirm" id="mConfirm">Send report</button>
    </div>
  </div>
</div>

<div id="hoverPrev"><img id="hoverImg" alt=""></div>

<script>
/* ============================================================
   Geary's Games — interactive pull sheet  (v3 · 2026-07-07)
   - nightsky theme + store logo
   - full set line: SETCODE, set name, condition, rarity badge
   - within each color/tier, sets order NEWEST-first by release date
   - per-copy pull AND per-copy missing: a qty>1 row needs one tap per
     copy for each (mirrored behavior); p+m never exceeds qty
   - thumbnails pinned by set code + collector number (exact
     printing), CDN product image first, name-lookup last resort
   - tap a thumbnail for a large view; mouse hover previews
   Loads data/sp.json + data/ct.json (only files dated today),
   merges, renders by color. Submit posts to the Apps Script.
   ============================================================ */
const CONFIG = {
  STORE_NAME: "Geary's Games",
  REPORT_ENDPOINT: "https://script.google.com/macros/s/AKfycbwDnGZHyvulmnxcOw6qif6lPtLD3u8cp0gy7esiiK-F1eMc73gasLxz9-O38cORQCMDqg/exec",
  REPORT_TO: "ryan@gearysgames.com",
  SOURCES: ["data/sp.json", "data/ct.json"],
  REQUIRE_TODAY: true
};

const COLORS = [
  {k:"W",label:"White"},{k:"U",label:"Blue"},{k:"B",label:"Black"},
  {k:"R",label:"Red"},{k:"G",label:"Green"},{k:"M",label:"Multi"},
  {k:"L",label:"Land"},{k:"BL",label:"Basic Land"},{k:"C",label:"Colorless"}
];
/* pull-order tiers within each color (matches the printed sheet) */
const TIER_NEW  = ["MSC","MAR","MSH"];          // Tier 1 — newest sets
const TIER_LAST = ["SLD","PLST","LIST"];        // Tier 3 — Secret Lair & The List
const TIERS = [
  {t:0, label:"New Sets · MSC / MAR / MSH"},
  {t:1, label:"All Other Sets"},
  {t:2, label:"SLD / The List"}
];
function tierOf(c){
  const sc = String(c.setcode||"").toUpperCase();
  if(TIER_NEW.includes(sc)) return 0;
  if(TIER_LAST.includes(sc)) return 2;
  return 1;
}
function cnum(c){ return parseInt(String(c.num||"").replace(/\D/g,""),10) || 0; }
const RARITY_NAMES = {N:"Common",U:"Uncommon",R:"Rare",M:"Mythic",S:"Special"};

const $ = s => document.querySelector(s);
const tabsEl = $("#tabs"), listEl = $("#list"), bannerEl = $("#banner");
const isFoil = c => String(c.finish||"").toUpperCase().includes("FOIL");
const qtyOf = c => Math.max(1, parseInt(c.qty,10) || 1);
let CARDS = [], ST = {}, activeColor = null, sheetDate = null;
const IMGIDX = {}, CHAINS = {};

function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

/* ---------- set release years (card "year" field first, Scryfall as fallback) ---------- */
let SETYEARS = {};
function yearOf(c){ return c.year || SETYEARS[String(c.setcode||"").toUpperCase()] || ""; }
/* full release-date sort key (newest-first). Prefer the card's own
   released_at (YYYY-MM-DD from the generator); fall back to the 4-digit
   year, then the Scryfall set-year map, so cross-year ordering is always
   correct even when a source only supplies a year. */
function relKey(c){
  const rd = String(c.released_at||"");
  if(/^\d{4}-\d{2}-\d{2}/.test(rd)) return rd.slice(0,10);
  const y = yearOf(c);
  return y ? y+"-00-00" : "0000-00-00";
}
async function loadSetYears(){
  try{
    const cached = JSON.parse(localStorage.getItem("gg_setyears")||"null");
    if(cached && Date.now()-cached.t < 7*864e5 && cached.m){ SETYEARS = cached.m; return; }
  }catch(e){}
  try{
    let url = "https://api.scryfall.com/sets";
    const m = {};
    while(url){
      const r = await fetch(url); if(!r.ok) break;
      const j = await r.json();
      (j.data||[]).forEach(s=>{ if(s.released_at) m[String(s.code).toUpperCase()] = s.released_at.slice(0,4); });
      url = j.has_more ? j.next_page : null;
    }
    if(Object.keys(m).length){ SETYEARS = m;
      try{ localStorage.setItem("gg_setyears", JSON.stringify({t:Date.now(), m})); }catch(e){} }
  }catch(e){}
}

/* ---------- image resolution: exact printing first ---------- */
function scryUrl(sc, n, v){
  return "https://api.scryfall.com/cards/"+sc+"/"+encodeURIComponent(n)+"?format=image&version="+v;
}
function imgChain(c){
  const a = [];
  const named = c.img && /\/cards\/named/.test(c.img);
  if(c.img && !named) a.push(c.img);                 // generator CDN product image = authoritative
  if(c.setcode && c.num){                            // pinned by set + collector = exact printing
    const sc = String(c.setcode).toLowerCase().trim();
    const raw = String(c.num).trim();
    const stripped = raw.replace(/^0+(?=.)/,"");
    a.push(scryUrl(sc, stripped, "small"));
    if(stripped !== raw) a.push(scryUrl(sc, raw, "small"));
  }
  if(named) a.push(c.img);                           // name-only lookup = last resort (arbitrary printing)
  return a;
}
function zoomSrc(c){
  if(c.setcode && c.num){
    const sc = String(c.setcode).toLowerCase().trim();
    const n = String(c.num).trim().replace(/^0+(?=.)/,"");
    return scryUrl(sc, n, "large");
  }
  const ch = CHAINS[c._id]||[]; return ch[Math.min(IMGIDX[c._id]||0, ch.length-1)] || c.img || "";
}
/* walk a thumb down its fallback chain on load errors */
function advanceImg(id, el){
  const chain = CHAINS[id] || [];
  const i = (IMGIDX[id]||0) + 1;
  IMGIDX[id] = i;
  if(i < chain.length){ el.src = chain[i]; }
  else { el.onerror = null; el.classList.add("ph"); el.removeAttribute("src"); }
}

/* ------------------------- data load ------------------------ */
async function load(){
  const today = todayStr();
  let loaded = [], stale = [], errs = [];
  const yearsP = loadSetYears();
  await Promise.all(CONFIG.SOURCES.map(async url => {
    try{
      const r = await fetch(url + "?t=" + Date.now(), {cache:"no-store"});
      if(!r.ok){ if(r.status!==404) errs.push(url+" ("+r.status+")"); return; }
      const j = await r.json();
      if(CONFIG.REQUIRE_TODAY && j.date && j.date !== today){ stale.push((j.source||url)+" @ "+j.date); return; }
      (j.cards||[]).forEach(c => { c.src = c.src || j.source || "?"; CARDS.push(c); });
      loaded.push(j.source || url);
      if(j.date) sheetDate = j.date;
    }catch(e){ errs.push(url); }
  }));

  CARDS.forEach((c,i)=>{ c._id = i+1; ST[c._id] = {p:0, m:0}; CHAINS[c._id] = imgChain(c); IMGIDX[c._id] = 0; });

  let notes = [];
  if(stale.length) notes.push("Ignoring stale data: " + stale.join(", "));
  if(errs.length) notes.push("Could not load: " + errs.join(", "));
  if(notes.length){ bannerEl.textContent = notes.join(" · ");
    bannerEl.className = "banner show " + (CARDS.length? "warn":"err"); }

  const d = sheetDate ? new Date(sheetDate+"T00:00:00") : new Date();
  $("#dateLabel").textContent = (isNaN(d)? (sheetDate||"") :
    d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric",year:"numeric"}))
    + (loaded.length? "  ·  "+loaded.join(" + ") : "");

  if(!CARDS.length){
    listEl.innerHTML = `<div class="msg">No orders to pull right now.<br><span style="font-size:13px">If you expected cards, the morning job may not have published yet — pull to refresh.</span></div>`;
    $("#summary").textContent = "0 cards";
    return;
  }
  await yearsP;   // set-year map (cached; harmless if it failed)
  render();
}

/* --------------------- per-copy pull state ------------------
   Both Pull and Missing are per-copy: each tap marks ONE more copy.
   p = copies pulled, m = copies missing, always p+m <= qty.
   A qty>N row therefore needs N Pull taps to fully pull it (mirrors
   how Missing is tapped one copy at a time). Each button cycles its
   own counter within the room the other leaves, wrapping back to 0. */
function pulledOf(c){ return ST[c._id].p; }
function missingOf(c){ return ST[c._id].m; }
function doneOf(c){ return pulledOf(c)+missingOf(c); }
function rowState(c){
  const q=qtyOf(c), m=missingOf(c), p=pulledOf(c), done=p+m;
  if(done>=q) return m===0 ? "pulled" : (p===0 ? "missing" : "partial");
  return (p>0||m>0) ? "partial" : "open";
}
function pullTap(c){
  const s=ST[c._id], q=qtyOf(c);
  if(q===1){ s.p = s.p?0:1; if(s.p) s.m=0; }
  else { s.p = (s.p+1 > q - s.m) ? 0 : s.p+1; }
  render();
}
function missTap(c){
  const s=ST[c._id], q=qtyOf(c);
  if(q===1){ s.m = s.m?0:1; if(s.m) s.p=0; }
  else { s.m = (s.m+1 > q - s.p) ? 0 : s.m+1; }
  render();
}

/* --------------------------- render -------------------------- */
function cardsFor(k){ return CARDS.filter(c => (c.color||"C") === k); }
function copies(cards){ return cards.reduce((n,c)=>n+qtyOf(c),0); }
function doneCopies(cards){ return cards.reduce((n,c)=>n+doneOf(c),0); }

function buildTabs(){
  tabsEl.innerHTML = "";
  const present = COLORS.filter(c => cardsFor(c.k).length > 0);
  if(!activeColor && present.length) activeColor = present[0].k;
  present.forEach(c => {
    const cs = cardsFor(c.k), total = copies(cs), done = doneCopies(cs);
    const t = document.createElement("div");
    t.className = "tab" + (c.k===activeColor?" active":"") + (done===total?" done":"");
    t.innerHTML = `<span class="pip c-${c.k}"></span>${c.label}<span class="cnt">${done}/${total}</span>`;
    t.onclick = () => { activeColor = c.k; render(); };
    tabsEl.appendChild(t);
  });
}

function render(){
  buildTabs();
  const cards = cardsFor(activeColor);
  listEl.innerHTML = "";
  /* order like the printed sheet: tier, then set, then collector number
     (foils interleaved); pull numbers run continuously across the color */
  const sorted = [...cards].sort((a,b) =>
    tierOf(a)-tierOf(b) ||
    relKey(b).localeCompare(relKey(a)) ||          // newest set first (by release date)
    String(a.setcode||"").localeCompare(String(b.setcode||"")) ||
    cnum(a)-cnum(b) ||
    String(a.name||"").localeCompare(String(b.name||"")));
  sorted.forEach((c,i)=>{ c._pn = i+1; });
  TIERS.forEach(T => {
    const g = sorted.filter(c => tierOf(c)===T.t);
    if(g.length) section(T.label, g);
  });
  updateTotals();
}

function section(title, cards){
  const h = document.createElement("div");
  h.className = "grouphdr";
  h.innerHTML = `<span>${title} — ${copies(cards)}</span><span class="rule"></span>`;
  listEl.appendChild(h);
  cards.forEach((c,i) => { const r = rowEl(c); if(i%2) r.classList.add("alt"); listEl.appendChild(r); });
}

function thumbHtml(c){
  const chain = CHAINS[c._id]||[], i = IMGIDX[c._id]||0;
  if(i < chain.length) return `<img class="thumb" data-id="${c._id}" src="${esc(chain[i])}" loading="lazy" alt="">`;
  return `<div class="thumb ph">no img</div>`;
}

function rarityHtml(c){
  const r = String(c.rarity||"").toUpperCase();
  if(!RARITY_NAMES[r]) return "";
  return `<span class="rar r${r}" title="${RARITY_NAMES[r]}">${r}</span>`;
}

function rowEl(c){
  const st = rowState(c), q = qtyOf(c), m = missingOf(c), p = pulledOf(c);
  const row = document.createElement("div");
  row.className = "row" + (st!=="open" ? " "+st : "");
  const bits = [];
  const yr = yearOf(c);
  if(c.set || c.setcode) bits.push(`${c.setcode?`<span class="sc">${esc(c.setcode)}</span> `:""}<i>${esc(c.set||"")}</i>${yr?` <span class="yr">(${esc(yr)})</span>`:""}`);
  if(String(c.src).toUpperCase()==="CT") bits.push('<span class="ctbig">CT</span>');
  if(c.cond) bits.push(esc(c.cond));
  const rar = rarityHtml(c); if(rar) bits.push(rar);
  bits.push("Cart "+esc(c.order||"?"));
  const prog = (q>1 && (m>0 || p>0))
    ? `<div class="pm">${p?`<span class="pp">${p} pulled</span>`:""}${p&&m?" · ":""}${m?`<span class="mm">${m} missing</span>`:""}${(p+m<q)?` · ${q-p-m} left`:""}</div>` : "";
  const pullLabel = q===1 ? (p?"✓ Pulled":"Pull") : (p>=q-m && p>0 ? `✓ Pull ${p}/${q}` : `Pull ${p}/${q}`);
  const missLabel = q===1 ? (m?"✕ Missing":"Missing") : `Missing ${m}/${q}`;
  row.innerHTML = `
    <div class="body">
      ${thumbHtml(c)}
      <div class="qty">${q}</div>
      <div class="info">
        <div class="name"><span class="pn">#${c._pn||"?"}</span>${esc(c.name)} <span class="num">#${esc(c.num||"")}</span>${isFoil(c)?'<span class="fo">FOIL</span>':''}</div>
        <div class="meta">${bits.join(" · ")}</div>
        ${prog}
      </div>
    </div>
    <div class="tag ${esc(c.src)}">${esc(c.src)}</div>
    <div class="actions">
      <button class="btn pull ${p>0?"on":""}">${pullLabel}</button>
      <button class="btn miss ${m>0?"on":""}">${missLabel}</button>
    </div>`;
  row.querySelector(".body").onclick = (e) => {
    const th = e.target.closest(".thumb");
    if(th){ if(!th.classList.contains("ph")) openZoom(c); return; }
    pullTap(c);
  };
  row.querySelector(".pull").onclick = e => { e.stopPropagation(); pullTap(c); };
  row.querySelector(".miss").onclick = e => { e.stopPropagation(); missTap(c); };
  /* image fallback chain + mouse hover preview */
  const th = row.querySelector("img.thumb");
  if(th){ th.onerror = () => advanceImg(c._id, th); }
  if(th && window.matchMedia("(hover:hover) and (pointer:fine)").matches){
    th.addEventListener("mouseenter", ev => showHover(c, ev));
    th.addEventListener("mousemove", ev => moveHover(ev));
    th.addEventListener("mouseleave", hideHover);
  }
  return row;
}

/* ------------------ zoom overlay + hover preview ------------- */
function openZoom(c){
  const ov = $("#zoomOv"), im = $("#zoomImg");
  im.onerror = () => { const ch=CHAINS[c._id]||[]; const cur=ch[Math.min(IMGIDX[c._id]||0,ch.length-1)]; if(cur && im.src!==cur) im.src=cur; };
  im.src = zoomSrc(c);
  $("#zoomCap").textContent = c.name + (c.set ? " — " + c.set : "") + (c.num ? "  #" + c.num : "");
  ov.classList.add("show");
}
$("#zoomOv").onclick = () => $("#zoomOv").classList.remove("show");
function showHover(c, ev){
  const hp = $("#hoverPrev"), im = $("#hoverImg");
  im.onerror = () => { const ch=CHAINS[c._id]||[]; const cur=ch[Math.min(IMGIDX[c._id]||0,ch.length-1)]; if(cur && im.src!==cur) im.src=cur; };
  im.src = zoomSrc(c);
  hp.style.display = "block";
  moveHover(ev);
}
function moveHover(ev){
  const hp = $("#hoverPrev");
  const W = 300, H = 420, pad = 18;
  let x = ev.clientX + pad, y = Math.min(Math.max(10, ev.clientY - H/2), window.innerHeight - H - 10);
  if(x + W > window.innerWidth - 10) x = ev.clientX - W - pad;
  hp.style.left = x + "px"; hp.style.top = y + "px";
}
function hideHover(){ $("#hoverPrev").style.display = "none"; }

/* -------------------------- totals --------------------------- */
function updateTotals(){
  const total = copies(CARDS);
  const pulled = CARDS.reduce((n,c)=>n+pulledOf(c),0);
  const missing = CARDS.reduce((n,c)=>n+missingOf(c),0);
  const done = pulled + missing, remaining = total - done;
  $("#ovPulled").textContent = pulled;
  $("#ovMissing").textContent = missing;
  $("#ovTotal").textContent = total;
  const pct = total ? Math.round(done/total*100) : 0;
  $("#ovBar").style.width = pct+"%";
  $("#ovPct").textContent = pct+"%";
  $("#summary").innerHTML = `<b>${done}</b>/${total} done · <span class="m">${missing} missing</span> · ${remaining} remaining`;
  const btn = $("#submit");
  btn.disabled = done === 0;
  btn.classList.toggle("warn", remaining>0 && done>0);
  btn.textContent = remaining>0 ? "Submit (incomplete)" : "Submit Pull Report";
}

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

/* -------------------------- submit --------------------------- */
$("#submit").onclick = () => {
  const missRows = CARDS.filter(c=>missingOf(c)>0);
  const unRows = CARDS.filter(c=>qtyOf(c)-doneOf(c)>0);
  const missCopies = missRows.reduce((n,c)=>n+missingOf(c),0);
  const unCopies = unRows.reduce((n,c)=>n+(qtyOf(c)-doneOf(c)),0);
  $("#mTitle").textContent = missCopies ? `Report ${missCopies} missing card${missCopies>1?"s":""}?` : "No missing cards — submit clean?";
  let sub = `Emails the report to ${CONFIG.REPORT_TO}.`;
  if(unCopies) sub += ` ${unCopies} card(s) still unmarked will be listed as NOT PULLED.`;
  $("#mSub").textContent = sub;
  const ml = $("#mList"); ml.innerHTML = "";
  if(!missRows.length && !unRows.length){ ml.innerHTML = "<div>Everything pulled. Clean report.</div>"; }
  missRows.forEach(c=>{
    const m=missingOf(c), q=qtyOf(c);
    ml.innerHTML += `<div>${m===q? m+"×" : m+" of "+q+"×"} ${esc(c.name)} — ${esc(c.set||"")} #${esc(c.num||"")}${isFoil(c)?" (FOIL)":""} · Cart ${esc(c.order||"?")} · <b>MISSING</b></div>`;
  });
  unRows.forEach(c=>{
    const u=qtyOf(c)-doneOf(c), q=qtyOf(c);
    ml.innerHTML += `<div>${u===q? u+"×" : u+" of "+q+"×"} ${esc(c.name)} — ${esc(c.set||"")} #${esc(c.num||"")}${isFoil(c)?" (FOIL)":""} · Cart ${esc(c.order||"?")} · <b>NOT PULLED</b></div>`;
  });
  $("#overlay").classList.add("show");
};
$("#mCancel").onclick = () => $("#overlay").classList.remove("show");
$("#mConfirm").onclick = submitReport;

function buildReport(){
  const base = c => ({name:c.name,num:c.num,set:c.set,setcode:c.setcode,cond:c.cond,
    finish:c.finish,order:c.order,src:c.src,color:c.color,qtyOrdered:qtyOf(c)});
  const missing = [], notPulled = [];
  let pulled = 0, missCopies = 0, unCopies = 0;
  CARDS.forEach(c=>{
    const q=qtyOf(c), m=missingOf(c), p=pulledOf(c), un=q-m-p;
    pulled += p; missCopies += m; unCopies += un;
    if(m>0)  missing.push(Object.assign(base(c), {qty:m,  status:"MISSING"}));
    if(un>0) notPulled.push(Object.assign(base(c), {qty:un, status:"NOT_PULLED"}));
  });
  return {
    store: CONFIG.STORE_NAME, date: sheetDate || todayStr(),
    submittedAt: new Date().toISOString(), to: CONFIG.REPORT_TO,
    totals: { total: copies(CARDS), pulled: pulled, missing: missCopies, notPulled: unCopies },
    missing, notPulled
  };
}

function submitReport(){
  const payload = buildReport();
  $("#overlay").classList.remove("show");
  toast("Sending report…");
  fetch(CONFIG.REPORT_ENDPOINT, {
    method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify(payload)
  }).then(r=>{ if(r.ok) toast("Report sent to "+CONFIG.REPORT_TO+" ✓");
    else toast("Send failed ("+r.status+"). Try again.", true);
  }).catch(()=>{ toast("Network error — try again.", true);
    console.log("PULL REPORT:", JSON.stringify(payload,null,2)); });
}

let toastT;
function toast(msg, err){
  const t=$("#toast"); t.textContent=msg; t.className="toast show"+(err?" err":"");
  clearTimeout(toastT); toastT=setTimeout(()=>t.className="toast",4000);
}

/* ---- auto-refresh: reload at 4:00 AM daily, and whenever the iPad
       wakes up on a new day (timers can sleep with the screen) ---- */
const LOADED_DAY = todayStr();
function msTo4am(){
  const n = new Date(), t = new Date(n);
  t.setHours(4,0,0,0);
  if(t <= n) t.setDate(t.getDate()+1);
  return t - n;
}
setTimeout(() => location.reload(), msTo4am());
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible" && todayStr() !== LOADED_DAY) location.reload();
});

load();
</script>
